<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>report03</title>

    <style>

        #mdiv{
            width: 720px;

        }

        .sd2{
            display: grid;
            grid-template-columns : repeat(5, 1fr)

        }

    </style>

</head>

<body>
    <h1>report03</h1>

    <div id ="mdiv">

        <div class = "sd1">
            <button class = "btn" id = "button-start" >시작하기</button>
        </div>

        
        <div class = "sd2" id="button-container"></div>
        

    </div>

    
    <script>

    let numArr = [];

    let count = 1;

    const start = document.getElementById('button-start')
    
    const container = document.getElementById('button-container');



        for (let i = 1; i <= 25; i++) {
  
        numArr[i] = i;
        
        }

    /* 0번째 배열 undefined */
    numArr.shift();

    // 배열 요소 위치 변경
    shuffle(numArr);

    start.onclick =

    function btns(){

        this.disabled=true;

        for (let i = 0; i < 25; i++){

            // 1 버튼 요소 생성
            const button = document.createElement('button');

            // 2 버튼 내용 및 속성 설정
            button.innerText = numArr[i];

            button.style.width = "144px";   // 가로
            button.style.height = "144px";  // 세로
        

            button.style.fontSize = "38px"; // 폰트 사이즈

            // 3. 버튼 클릭 이벤트 추가
            button.addEventListener('click', function() {
                
                if(numArr[i] == count){
                     button.style.opacity = '0'; // 불투명도
                    count = count + 1;
                }

                if(numArr[i] == 25){
                    alert("축하해요");
                    }
                
            });

            // 4 컨테이너에 버튼 추가
            container.appendChild(button);

        }

    }

    function shuffle(numArr) {
    numArr.sort(() => Math.random() - 0.5);
    }
    
</script>   
    

    
</body>
</html>
